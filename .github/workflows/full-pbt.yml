name: Full PBT

on:
  workflow_dispatch:
  schedule:
    - cron: '17 8 * * *'
  push:
    branches: [main]

jobs:
  full-pbt:
    name: Full PBT
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-full-pbt-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-full-pbt-

      - name: Download dependencies
        run: go mod download

      - name: Full rapid PBT
        run: make ci-full
